<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 200px;
    padding: 16px;
    font-family: sans-serif;
    margin: 0;
  }
  h2 {
    font-size: 13px;
    margin: 0 0 14px;
    color: #333;
    text-align: center;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .label {
    font-size: 13px;
    color: #444;
  }
  .toggle {
    width: 46px;
    height: 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    top: 3px;
    transition: left 0.2s;
  }
  .toggle.on  { background: #4caf50; }
  .toggle.off { background: #ccc; }
  .toggle.on::after  { left: 25px; }
  .toggle.off::after { left: 3px; }
</style>
</head>
<body>
  <h2>🧤 Glove Cursor</h2>
  <div class="row">
    <span class="label">手袋カーソル</span>
    <button class="toggle" id="toggleCursor"></button>
  </div>
  <div class="row">
    <span class="label">✨ キラキラ</span>
    <button class="toggle" id="toggleSparkle"></button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
